---
# prepare.yml : l'image postgres (Debian) n'embarque ni python ni psycopg2.
# On les installe DANS l'instance, puis on attend que postgres reponde.
- name: Prepare
  hosts: all
  gather_facts: false
  vars:
    molecule_pg_password: changeme_postgres_superuser
  tasks:
    - name: "Install python3 and psycopg2 (raw: python pas encore present)"
      ansible.builtin.raw: >-
        apt-get update -qq &&
        DEBIAN_FRONTEND=noninteractive apt-get install -y -qq
        python3 python3-psycopg2
      register: apt_install
      changed_when: false

    - name: "Gather facts now that python3 is available"
      ansible.builtin.setup:

    - name: "Wait for PostgreSQL to accept connections"
      community.postgresql.postgresql_ping:
        login_host: localhost
        login_port: 5432
        login_user: postgres
        login_password: "{{ molecule_pg_password }}"
        login_db: postgres
      register: pg_ping
      until: pg_ping.is_available | default(false)
      retries: 30
      delay: 2