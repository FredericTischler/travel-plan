---
# roles/postgres/defaults/main.yml
#
# Variables d'INFRASTRUCTURE du role postgres.
# Le role ne fait QUE : rendre un fragment de service Compose + provisionner
# l'instance (2 bases vides, 2 comptes a droits limites, leurs privileges).
# Aucune table / index / contrainte metier : ca releve de Flyway cote services.

# --- Image (tag epingle, jamais latest) -------------------------------------
# Tag verifie via `docker manifest inspect postgres:17.5-bookworm` (EXISTS).
# 17.x = majeure stable courante ; patch precis ; variant bookworm (Debian).
postgres_image: "postgres:17.5-bookworm"

# --- Service / conteneur rendu dans le fragment Compose ---------------------
postgres_service_name: "postgres"
postgres_container_name: "travel-plan-postgres"
# Reseau interne : base JAMAIS exposee a l'hote (cf. docs §4, data-net).
postgres_network: "data-net"
# Garde-fou RAM 8 Go (cf. docs §4) : limite memoire raisonnable.
postgres_mem_limit: "256m"
# Repertoire ou Ansible rend le fragment compose (surcharge en prod / molecule).
postgres_compose_dir: "/opt/travel-plan/postgres"
# Volume nomme pour la persistance des donnees.
postgres_data_volume: "travel-plan-postgres-data"

# --- Superuser de provisioning (sert UNIQUEMENT a provisionner) -------------
# En prod : injecte depuis Vault. Ici : valeur de dev evidente a surcharger.
postgres_superuser: "postgres"
postgres_superuser_password: "changeme_postgres_superuser"  # noqa: surcharger via Vault

# Cible de connexion pour les taches de provisioning (modules community.postgresql).
# En prod ces taches tournent contre l'instance via le reseau ; ici parametrable.
postgres_login_host: "localhost"
postgres_login_port: 5432

# --- Bases applicatives (vides : juste l'instance + les bases) --------------
postgres_databases:
  - name: "identity_db"
    owner: "identity_user"
  - name: "payment_db"
    owner: "payment_user"

# --- Comptes applicatifs a DROITS LIMITES (moindre privilege) ---------------
# NOSUPERUSER,NOCREATEDB,NOCREATEROLE : aucun compte applicatif superuser.
# Mots de passe = valeurs de dev evidentes, A SURCHARGER VIA VAULT en prod.
postgres_app_users:
  - name: "identity_user"
    password: "changeme_identity_user"   # noqa: surcharger via Vault
    db: "identity_db"
  - name: "payment_user"
    password: "changeme_payment_user"    # noqa: surcharger via Vault
    db: "payment_db"

# --- Extensions -------------------------------------------------------------
# AUCUNE par defaut : citext/uuid-ossp relevent du schema Flyway, pas de l'infra.
# Ne pas ajouter d'extension "au cas ou".
postgres_extensions: []

# --- Integration Vault (lecture des secrets au rendu / provisioning) --------
# postgres_vault_read: false (defaut) => Molecule-safe, aucune lecture Vault.
# postgres_vault_read: true  => lecture depuis Vault (run reel, passer via -e).
postgres_vault_read: false

# Chemin du .env Docker Compose genere par Ansible avec le secret superuser.
# Doit etre dans le meme repertoire que docker-compose.yml (auto-charge par Compose).
# Ne commiter JAMAIS ce fichier (.gitignore).
postgres_runtime_env_path: "/opt/travel-plan/.env"

# Variables Vault pour le run reel (ignorees quand postgres_vault_read: false).
# A surcharger via -e en prod. Coherentes avec vault/defaults/main.yml.
vault_addr: "http://localhost:8200"
vault_kv_mount: "secret"
vault_dev_root_token: "changeme_vault_root_token"  # noqa: surcharger via ansible-vault

# Proprietaire du .env genere (lu par Docker Compose, qui tourne en tant qu'utilisateur
# normal — pas root). Utilise lookup('env', ...) pour ne PAS dependre de gather_facts :
# ansible_env et ansible_user_id sont des facts indisponibles si gather_facts: false.
# SUDO_USER (vide si pas de sudo) -> USER (toujours present en shell Linux/macOS).
# Le second argument `true` de default() traite la chaine vide comme "non defini".
postgres_env_owner: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"