---
# Playbook de test/application LOCAL du rôle docker-host.
# Self-contained : charge le rôle par son chemin absolu (= playbook_dir, puisque ce
# fichier est à la racine du rôle). Aucun roles_path ni export shell requis.
#
# ATTENTION : appliquer ce playbook installe RÉELLEMENT Docker sur la machine locale.
# Lancement (depuis la racine du projet, venv activé) :
#   ansible-playbook ansible/roles/docker-host/test-local.yml -K
- name: Préparer l'hôte Docker (local)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  roles:
    - role: "{{ playbook_dir }}"
