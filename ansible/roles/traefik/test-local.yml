---
# Playbook de test/application LOCAL du rôle traefik.
# Self-contained : charge le rôle par son chemin absolu (= playbook_dir, puisque ce
# fichier est à la racine du rôle). Aucun roles_path ni export shell requis.
#
# ATTENTION : appliquer ce playbook écrit RÉELLEMENT sous /opt/travel-plan/traefik
# (répertoires config statique/dynamique, certificats TLS auto-signés générés
# localement, et fragment compose.traefik.yml). Il NE démarre AUCUN conteneur : ce
# rôle se contente de PROVISIONNER + rendre le fragment Compose (pas de
# docker_container ni de `docker compose up`), conforme au modèle "Ansible
# provisionne, Compose orchestre" déjà en place pour postgres/vault/neo4j.
# Lancement (depuis la racine du projet, venv activé) :
#   ansible-playbook ansible/roles/traefik/test-local.yml -K
- name: Provisionner la gateway Traefik (local)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  roles:
    - role: "{{ playbook_dir }}"